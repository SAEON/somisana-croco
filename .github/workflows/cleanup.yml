name: cleanup commands

on:
  workflow_call:
    inputs:
      RUNNER_NAME:
        description: 'specify the runner name to determine what server we are running on'
        required: true
        type: string
      BRANCH_REF:
        description: 'what branch are we on - defined dynamically in run_ops.yml'
        required: true
        type: string

jobs:
  cleanup-ops-server:
    runs-on: ${{ inputs.RUNNER_NAME }}
    steps:
      - name: Clean /home/somisana/ops/${{ inputs.BRANCH_REF }}
        # remove all directories older than 5 days on the the server where the model is run 
        # anything not archived will be lost!
        id: cleanup_runner
        run: |
          sudo find /home/somisana/ops/${{ inputs.BRANCH_REF }}/* -maxdepth 0 -type d -mtime +5 -exec rm -rf {} +
  cleanup-archive:
    runs-on: ${{ inputs.RUNNER_NAME }}
    steps:
      - name: Clean /mnt/ocims-somisana
        # clean certain file types in the public facing archive
        # we only want to keep the forecast portion of the archived forecast runs
        # (the various tiered outputs can be regenerated if needed)
        # timeout added because /mnt/ocims-somisana is a network mount that can hang
        # Retries + fail-soft per directory: /mnt/ocims-somisana is a CIFS mount of a
        # dual-protocol NAS (reparse=nfs). NFS clients elsewhere can leave server-side
        # silly-rename reparse points that make rm -rf fail with "Directory not empty".
        # We retry with find -depth -delete and skip stuck dirs so one wedged directory
        # doesn't take down the rest of cleanup (or the docker prune that follows).
        id: cleanup_archive
        timeout-minutes: 30
        run: |
          cleanup_dir() {
            local d="$1"
            for attempt in 1 2 3; do
              if sudo find "$d" -depth -delete 2>/dev/null; then
                return 0
              fi
              sleep 5
            done
            echo "WARN: could not fully remove $d after 3 attempts; leaving for sysadmin"
            sudo ls -la "$d" 2>/dev/null | head -20 || true
            return 0
          }
          export -f cleanup_dir

          for base in \
            /mnt/ocims-somisana/public-facing/sa-west/v1.0/forecasts \
            /mnt/ocims-somisana/public-facing/sa-southeast/v1.0/forecasts \
            /mnt/ocims-somisana/public-facing/sa-forcing; do
            sudo find "$base" -mindepth 1 -maxdepth 1 -type d -name '20*' -mtime +6 \
              -exec bash -c 'cleanup_dir "$0"' {} \;
          done
      - name: Clean /mnt/saeon-somisana
        # this is cleaning up the Mercator files we download on the SAEON hosted server and share via this mount
        # timeout added because /mnt/saeon-somisana is a network mount that can hang
        # if: always() ensures this step runs even if the previous step failed or timed out
        id: cleanup_saeon_mount
        if: always()
        timeout-minutes: 10
        run: |
          sudo find /mnt/saeon-somisana/data/shared/ -type f \( -name "*MERCATOR*nc" \) -mtime +5 -exec rm -fr {} +
  
  prune-images:
    runs-on: ${{ inputs.RUNNER_NAME }}
    steps:
      - name: remove all unused docker images and containers
        run: |
          # ensure that we don't keep building up a stash of images, which can use a lot of resources
          docker system prune -f
